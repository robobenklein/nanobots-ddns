title: Nanobots DDNS
description: Dynamic DNS service for nanobots, with no accounts, registration, tracking or PII of any kind.

theme: just-the-docs
color_scheme: dark

url: https://docs.nanobots.club
sourcecode_url: https://github.com/robobenklein/nanobots-ddns

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      nanobots_api: "https://v1.nanobots-api.unhexium.dev"
      nanobots_domain: "nanobots.club"

aux_links:
  Template Repository: https://github.com/just-the-docs/just-the-docs-template
